<nav class="fixed top-0 left-0 right-0 z-50 border-b-gray-700/20 backdrop-blur-md border-b-2">
  <div class="max-w-7xl mx-auto px-6 lg:px-8 py-4 flex items-center justify-between">
    <button (click)="scrollToSection('home')"
      class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-cyan-400 hover:from-purple-300 hover:to-cyan-300 transition-all flex-shrink-0">
      GP
    </button>

    <div class="hidden md:flex items-center gap-8">
      <button (click)="scrollToSection('about')"
        class="text-violet-100 hover:text-purple-400 transition-colors font-medium text-sm">
        {{'NAVBAR.ABOUT' | translate}}
      </button>
      <button (click)="scrollToSection('skills')"
        class="text-violet-100 hover:text-purple-400 transition-colors font-medium text-sm">
        {{'NAVBAR.SKILLS' | translate}}
      </button>
      <button (click)="scrollToSection('companiesWorked')"
        class="text-violet-100 hover:text-cyan-400 transition-colors font-medium text-sm">
        {{'NAVBAR.EXPERIENCE' | translate}}
      </button>
      <button (click)="scrollToSection('projects')"
        class="text-violet-100 hover:text-cyan-400 transition-colors font-medium text-sm">
        {{'NAVBAR.PROJECTS' | translate}}
      </button>
    </div>
    <div class="flex items-center gap-4">
      <div class="flex gap-2">
        <button (click)="changeLang('pt')" [ngClass]="{
            'ring-2 ring-purple-400': currentLang === 'pt',
            'ring-1 ring-slate-700': currentLang !== 'pt'
          }"
          class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-white/10 backdrop-blur-md hover:bg-white/20 transition-all shadow-lg border-2 border-white/50 overflow-hidden p-0 flex items-center justify-center flex-shrink-0"
          aria-label="Português">
          <img src="assets/flags/br-flag.png" alt="Bandeira do Brasil" class="w-full h-full object-cover" />
        </button>
        <button (click)="changeLang('en')" [ngClass]="{
            'ring-2 ring-cyan-400': currentLang === 'en',
            'ring-1 ring-slate-700': currentLang !== 'en'
          }"
          class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-white/10 backdrop-blur-md hover:bg-white/20 transition-all shadow-lg border-2 border-white/50 overflow-hidden p-0 flex items-center justify-center flex-shrink-0"
          aria-label="English">
          <img src="assets/flags/eua-flag.png" alt="Bandeira dos EUA" class="w-full h-full object-cover" />
        </button>
      </div>
      <button (click)="toggleMobileMenu()"
        class="md:hidden text-violet-100 hover:text-purple-400 transition-colors flex-shrink-0">
        <span class="text-2xl">{{ isMobileMenuOpen ? '✕' : '☰' }}</span>
      </button>
    </div>
  </div>

  <div *ngIf="isMobileMenuOpen" class="md:hidden bg-slate-900/80 backdrop-blur-md border-t-2 border-white/50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex flex-col gap-3">
      <button (click)="scrollToSection('home'); toggleMobileMenu()"
        class="text-left text-violet-100 hover:text-purple-400 transition-colors font-medium py-2 text-sm">
        Home
      </button>
      <button (click)="scrollToSection('about'); toggleMobileMenu()"
        class="text-left text-violet-100 hover:text-purple-400 transition-colors font-medium py-2 text-sm">
        About
      </button>
      <button (click)="scrollToSection('skills'); toggleMobileMenu()"
        class="text-left text-violet-100 hover:text-purple-400 transition-colors font-medium py-2 text-sm">
        Skills
      </button>
      <button (click)="scrollToSection('companiesWorked'); toggleMobileMenu()"
        class="text-left text-violet-100 hover:text-cyan-400 transition-colors font-medium py-2 text-sm">
        Experience
      </button>
      <button (click)="scrollToSection('projects'); toggleMobileMenu()"
        class="text-left text-violet-100 hover:text-cyan-400 transition-colors font-medium py-2 text-sm">
        Projects
      </button>
    </div>
  </div>
</nav>
